<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 220) rotate(90) scale(280 360)">
      <stop stop-color="#3b82f6" stop-opacity=".35"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 180) rotate(90) scale(220 300)">
      <stop stop-color="#22d3ee" stop-opacity=".25"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="36" fill="url(#glow1)"/>
  <rect width="1200" height="800" rx="36" fill="url(#glow2)"/>

  <!-- Desk -->
  <rect x="80" y="550" width="1040" height="170" rx="22" fill="#0b1222" stroke="#1e293b"/>

  <!-- Laptop -->
  <rect x="360" y="315" width="500" height="250" rx="18" fill="url(#screen)" stroke="#334155"/>
  <rect x="382" y="338" width="456" height="180" rx="10" fill="#0a1326"/>
  <rect x="382" y="338" width="456" height="180" rx="10" fill="url(#glow1)" opacity=".55"/>
  <rect x="300" y="560" width="620" height="30" rx="12" fill="#1e293b"/>

  <!-- Code lines on screen -->
  <rect x="420" y="372" width="170" height="10" rx="5" fill="#22d3ee" opacity=".75"/>
  <rect x="420" y="398" width="260" height="10" rx="5" fill="#64748b"/>
  <rect x="420" y="424" width="200" height="10" rx="5" fill="#3b82f6" opacity=".85"/>
  <rect x="420" y="450" width="290" height="10" rx="5" fill="#475569"/>
  <rect x="420" y="476" width="140" height="10" rx="5" fill="#22d3ee" opacity=".65"/>

  <!-- Developer silhouette -->
  <circle cx="790" cy="280" r="62" fill="#111827"/>
  <path d="M690 470c16-86 68-132 132-132s119 42 138 132" fill="#0f172a"/>
  <path d="M745 296c14 10 34 18 53 18 23 0 40-8 50-18" stroke="#334155" stroke-width="7" stroke-linecap="round"/>

  <!-- Headphones -->
  <path d="M736 280c0-36 24-66 54-66s54 30 54 66" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
  <rect x="726" y="274" width="18" height="40" rx="9" fill="#1e293b"/>
  <rect x="836" y="274" width="18" height="40" rx="9" fill="#1e293b"/>

  <!-- Floating cards -->
  <rect x="120" y="135" width="280" height="160" rx="16" fill="#0f172a" stroke="#334155"/>
  <rect x="150" y="172" width="160" height="12" rx="6" fill="#475569"/>
  <rect x="150" y="198" width="220" height="12" rx="6" fill="#334155"/>
  <rect x="150" y="224" width="180" height="12" rx="6" fill="#334155"/>

  <rect x="860" y="120" width="220" height="130" rx="16" fill="#0f172a" stroke="#334155"/>
  <rect x="892" y="157" width="150" height="10" rx="5" fill="#22d3ee" opacity=".7"/>
  <rect x="892" y="180" width="125" height="10" rx="5" fill="#475569"/>
  <rect x="892" y="203" width="95" height="10" rx="5" fill="#475569"/>

  <!-- Bottom status chips -->
  <rect x="120" y="610" width="240" height="66" rx="12" fill="#111827" stroke="#334155"/>
  <rect x="400" y="610" width="240" height="66" rx="12" fill="#111827" stroke="#334155"/>
  <rect x="680" y="610" width="240" height="66" rx="12" fill="#111827" stroke="#334155"/>
  <rect x="960" y="610" width="160" height="66" rx="12" fill="url(#accent)" opacity=".18" stroke="#38bdf8" stroke-opacity=".45"/>
</svg>
