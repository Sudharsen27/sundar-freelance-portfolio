<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1222"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 240) rotate(90) scale(320 360)">
      <stop stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 760) rotate(90) scale(360 420)">
      <stop stop-color="#2563eb" stop-opacity=".3"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="1000" rx="52" fill="url(#bg)"/>
  <rect width="1000" height="1000" rx="52" fill="url(#g1)"/>
  <rect width="1000" height="1000" rx="52" fill="url(#g2)"/>

  <!-- Main dashboard frame -->
  <rect x="86" y="96" width="828" height="808" rx="28" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- Top bars -->
  <rect x="126" y="136" width="250" height="150" rx="18" fill="#111b2f" stroke="#334155"/>
  <rect x="406" y="136" width="468" height="66" rx="16" fill="#111b2f" stroke="#334155"/>
  <rect x="406" y="220" width="300" height="66" rx="16" fill="#111b2f" stroke="#334155"/>

  <!-- Left stat cards -->
  <rect x="126" y="318" width="250" height="128" rx="16" fill="#0d182b" stroke="#334155"/>
  <rect x="126" y="464" width="250" height="128" rx="16" fill="#0d182b" stroke="#334155"/>
  <rect x="126" y="610" width="250" height="128" rx="16" fill="#0d182b" stroke="#334155"/>

  <!-- Right content panel -->
  <rect x="406" y="318" width="468" height="420" rx="20" fill="#0b1528" stroke="#334155"/>
  <rect x="434" y="348" width="412" height="160" rx="14" fill="#081326"/>
  <rect x="434" y="348" width="412" height="160" rx="14" fill="url(#g1)" opacity=".55"/>

  <!-- Code lines -->
  <rect x="466" y="382" width="170" height="10" rx="5" fill="#22d3ee" opacity=".8"/>
  <rect x="466" y="408" width="300" height="10" rx="5" fill="#64748b"/>
  <rect x="466" y="434" width="230" height="10" rx="5" fill="#3b82f6" opacity=".9"/>
  <rect x="466" y="460" width="340" height="10" rx="5" fill="#475569"/>

  <!-- Mini cards -->
  <rect x="434" y="532" width="128" height="92" rx="12" fill="#0f1a2f" stroke="#334155"/>
  <rect x="576" y="532" width="128" height="92" rx="12" fill="#0f1a2f" stroke="#334155"/>
  <rect x="718" y="532" width="128" height="92" rx="12" fill="#0f1a2f" stroke="#334155"/>

  <!-- Developer portrait circle -->
  <circle cx="760" cy="772" r="86" fill="#101b30" stroke="url(#line)" stroke-opacity=".6"/>
  <circle cx="760" cy="772" r="56" fill="#16253e"/>
  <path d="M724 770c8 8 20 14 36 14 17 0 29-6 36-14" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <path d="M716 742c0-22 18-40 44-40s44 18 44 40" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/>
  <rect x="709" y="740" width="14" height="28" rx="7" fill="#1e293b"/>
  <rect x="797" y="740" width="14" height="28" rx="7" fill="#1e293b"/>

  <!-- CTA bar -->
  <rect x="434" y="772" width="280" height="56" rx="14" fill="#10223f" stroke="url(#line)"/>
  <rect x="462" y="796" width="224" height="8" rx="4" fill="#93c5fd" opacity=".75"/>
</svg>
